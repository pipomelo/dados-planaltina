<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Layer Control</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #layerControl { background: white; border: 1px solid #ccc; padding: 10px; position: absolute; top: 10px; left: 10px; z-index: 999; }
        .layer-checkbox { margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="layerControl">
        <h3>Layer Control</h3>
        <div class="layer-checkbox">
            <input type="checkbox" id="googleSatellite" checked>
            <label for="googleSatellite">Google Satellite</label>
        </div>
        <div class="layer-checkbox">
            <input type="checkbox" id="guaPlanaltina" checked>
            <label for="guaPlanaltina">guaPlanaltina</label>
        </div>
        <div class="layer-checkbox">
            <input type="checkbox" id="LUOS" checked>
            <label for="LUOS">LUOS</label>
        </div>
        <div class="layer-checkbox">
            <input type="checkbox" id="PLANALTINA" checked>
            <label for="PLANALTINA">PLANALTINA</label>
        </div>
    </div>
    <div id="map" style="height: 100vh;"></div>

    <script>
        // Initialize the map
        const map = L.map('map').setView([-15.7801, -47.9292], 13); // Center at Planaltina location

        // Base layers
        const googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });
        const guaPlanaltina = L.tileLayer('URL_TO_GUAPLANALTINA', { /* Options */ });
        const LUOS = L.tileLayer('URL_TO_LUOS', { /* Options */ });
        const PLANALTINA = L.tileLayer('URL_TO_PLANALTINA', { /* Options */ });

        // Add the layers to the map
        googleSatellite.addTo(map);
        guaPlanaltina.addTo(map);
        LUOS.addTo(map);
        PLANALTINA.addTo(map);

        // Handle layer visibility
        document.getElementById('googleSatellite').addEventListener('change', function() {
            if (this.checked) {
                googleSatellite.addTo(map);
            } else {
                map.removeLayer(googleSatellite);
            }
        });
        document.getElementById('guaPlanaltina').addEventListener('change', function() {
            if (this.checked) {
                guaPlanaltina.addTo(map);
            } else {
                map.removeLayer(guaPlanaltina);
            }
        });
        document.getElementById('LUOS').addEventListener('change', function() {
            if (this.checked) {
                LUOS.addTo(map);
            } else {
                map.removeLayer(LUOS);
            }
        });
        document.getElementById('PLANALTINA').addEventListener('change', function() {
            if (this.checked) {
                PLANALTINA.addTo(map);
            } else {
                map.removeLayer(PLANALTINA);
            }
        });
    </script>
</body>
</html>
